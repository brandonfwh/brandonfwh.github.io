<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandon Whitehead | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--gc-indigo:#2D1B69;--gc-purple:#4B2D8E;--gc-violet:#6E3FC7;--gc-lavender:#9B7FD4;--gc-bright:#B794F6;--gc-glow:#C4A1FF;--gc-white:#E8E0F5;--gc-dark:#0D0A1A;--gt-gold:#B3A369;--win-bg:rgba(13,10,26,0.94);--win-border:rgba(155,127,212,0.2);--win-header:rgba(20,14,40,0.98);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--gc-dark);color:var(--gc-white);font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh;width:100vw;}
#three-canvas{position:fixed;inset:0;z-index:0;}
.header{position:fixed;top:0;left:0;right:0;z-index:20;padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;pointer-events:none;}
.header-logo{font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.3em;color:var(--gc-lavender);text-transform:uppercase;pointer-events:auto;cursor:pointer;transition:color 0.3s;}
.header-logo:hover{color:var(--gc-glow);}.header-logo span{color:var(--gt-gold);}
.header-hint{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:rgba(155,127,212,0.4);letter-spacing:0.1em;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.7;}}
.face-nav{position:fixed;z-index:15;pointer-events:auto;}
.nav-left{left:1.5rem;top:50%;transform:translateY(-50%);}.nav-right{right:1.5rem;top:50%;transform:translateY(-50%);}
.face-btn{font-family:'Orbitron',sans-serif;font-size:0.55rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gc-lavender);background:rgba(13,10,26,0.65);border:1px solid rgba(155,127,212,0.15);border-radius:4px;padding:0.45rem 1rem;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);backdrop-filter:blur(10px);display:block;margin-bottom:0.4rem;white-space:nowrap;}
.face-btn:hover{color:var(--gc-glow);border-color:var(--gc-violet);background:rgba(75,45,142,0.25);transform:translateX(4px);}
.face-btn.active{color:var(--gt-gold);border-color:rgba(179,163,105,0.35);background:rgba(179,163,105,0.08);}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:flex-end;pointer-events:none;}
.stats-row{display:flex;gap:2.5rem;}.stat-item .val{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--gc-glow);line-height:1;}
.stat-item .lbl{font-family:'Share Tech Mono',monospace;font-size:0.5rem;color:var(--gc-lavender);letter-spacing:0.15em;text-transform:uppercase;margin-top:0.15rem;}
#faceLabel{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:800;color:var(--gc-glow);text-transform:uppercase;letter-spacing:0.12em;text-align:right;text-shadow:0 0 30px rgba(196,161,255,0.3);transition:all 0.4s;}
#faceSublabel{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:var(--gc-lavender);letter-spacing:0.2em;text-align:right;margin-top:0.2rem;}
.os-window{position:fixed;z-index:50;background:var(--win-bg);border:1px solid var(--win-border);border-radius:8px;backdrop-filter:blur(25px);display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 1px rgba(155,127,212,0.3);opacity:0;transform:scale(0.92);transition:opacity 0.3s ease,transform 0.3s cubic-bezier(0.16,1,0.3,1);pointer-events:none;min-width:320px;min-height:200px;}
.os-window.open{opacity:1;transform:scale(1);pointer-events:auto;}
.os-window.minimized{opacity:0;transform:scale(0.5) translateY(50vh);pointer-events:none;}
.os-window.maximized{top:0!important;left:0!important;width:100vw!important;height:100vh!important;border-radius:0;}
.win-header{background:var(--win-header);padding:0.5rem 0.75rem;display:flex;align-items:center;justify-content:space-between;border-radius:8px 8px 0 0;cursor:grab;user-select:none;flex-shrink:0;border-bottom:1px solid rgba(155,127,212,0.08);}
.os-window.maximized .win-header{border-radius:0;}.win-header:active{cursor:grabbing;}
.win-title{font-family:'Orbitron',sans-serif;font-size:0.6rem;font-weight:600;color:var(--gc-lavender);letter-spacing:0.15em;text-transform:uppercase;display:flex;align-items:center;gap:0.5rem;}
.win-title .win-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.win-controls{display:flex;gap:6px;}
.win-ctrl{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;transition:all 0.15s;opacity:0.8;}
.win-ctrl:hover{opacity:1;transform:scale(1.2);}.win-ctrl.close{background:#ff5f57;}.win-ctrl.minimize{background:#febc2e;}.win-ctrl.maximize{background:#28c840;}
.win-accent{height:2px;flex-shrink:0;}
.win-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;scrollbar-width:thin;scrollbar-color:var(--gc-purple) transparent;}
.win-body::-webkit-scrollbar{width:4px;}.win-body::-webkit-scrollbar-track{background:transparent;}.win-body::-webkit-scrollbar-thumb{background:var(--gc-purple);border-radius:2px;}
.win-body p{font-size:0.88rem;color:rgba(232,224,245,0.7);line-height:1.75;margin-bottom:0.65rem;}
.wsec{margin-bottom:1.5rem;}.wsec-title{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--gt-gold);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.5rem;padding-bottom:0.35rem;border-bottom:1px solid rgba(179,163,105,0.12);}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem 1.25rem;}
.wrow{display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid rgba(155,127,212,0.05);}
.wkey{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--gc-lavender);}.wval{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--gc-white);font-weight:500;}.wval.gold{color:var(--gt-gold);}
.wchip{font-family:'Share Tech Mono',monospace;font-size:0.57rem;color:var(--gc-lavender);background:rgba(155,127,212,0.08);border:1px solid rgba(155,127,212,0.1);padding:0.15rem 0.45rem;border-radius:3px;display:inline-block;margin:0.12rem;}
.proj-entry{padding:0.65rem 0.5rem;border-bottom:1px solid rgba(155,127,212,0.06);cursor:pointer;transition:all 0.2s;border-radius:4px;}
.proj-entry:hover{background:rgba(155,127,212,0.06);padding-left:0.75rem;}.proj-entry:last-child{border-bottom:none;}
.proj-entry .pe-name{font-family:'Rajdhani',sans-serif;font-size:0.92rem;font-weight:600;color:var(--gc-white);}
.proj-entry .pe-desc{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--gc-lavender);line-height:1.5;margin-top:0.1rem;}
.proj-entry .pe-tag{font-family:'Share Tech Mono',monospace;font-size:0.5rem;color:var(--gt-gold);letter-spacing:0.08em;display:inline-block;margin-top:0.25rem;padding:0.1rem 0.4rem;background:rgba(179,163,105,0.08);border:1px solid rgba(179,163,105,0.12);border-radius:2px;margin-right:0.2rem;}
.act-item{padding:0.5rem 0;border-bottom:1px solid rgba(155,127,212,0.05);}.act-item:last-child{border-bottom:none;}
.act-item .act-name{font-family:'Rajdhani',sans-serif;font-size:0.88rem;font-weight:600;color:var(--gc-white);}
.act-item .act-desc{font-family:'Rajdhani',sans-serif;font-size:0.8rem;color:rgba(232,224,245,0.55);line-height:1.5;margin-top:0.1rem;}
.pd-highlight{background:rgba(179,163,105,0.05);border-left:2px solid var(--gt-gold);padding:0.75rem 1rem;border-radius:0 4px 4px 0;margin:0.75rem 0;}
.pd-highlight p{font-size:0.85rem!important;margin-bottom:0!important;}
.pd-img-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.5rem;}
.pd-img{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;aspect-ratio:16/10;overflow:hidden;}
.pd-img img{width:100%;height:100%;object-fit:cover;}
.pd-techgrid{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem 1rem;}
.pd-techitem{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--gc-lavender);padding:0.35rem 0 0.35rem 0.8rem;position:relative;border-bottom:1px solid rgba(255,255,255,0.02);}
.pd-techitem::before{content:'>';position:absolute;left:0;color:var(--gt-gold);font-weight:600;}
.gh-link{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--gt-gold);text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;padding:0.4rem 0.8rem;background:rgba(179,163,105,0.06);border:1px solid rgba(179,163,105,0.15);border-radius:4px;transition:all 0.2s;margin-top:0.5rem;}
.gh-link:hover{background:rgba(179,163,105,0.12);}
.taskbar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:32px;background:rgba(13,10,26,0.95);border-top:1px solid rgba(155,127,212,0.1);display:none;align-items:center;padding:0 0.75rem;gap:4px;backdrop-filter:blur(15px);}
.taskbar.has-windows{display:flex;}
.taskbar-item{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:var(--gc-lavender);background:rgba(75,45,142,0.15);border:1px solid rgba(155,127,212,0.1);border-radius:3px;padding:0.2rem 0.6rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;}
.taskbar-item:hover{background:rgba(75,45,142,0.3);}.taskbar-item.active-task{border-color:var(--gt-gold);color:var(--gt-gold);}
.loader{position:fixed;inset:0;z-index:999;background:var(--gc-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s,visibility 0.8s;}
.loader.done{opacity:0;visibility:hidden;}
.loader-cube{width:45px;height:45px;border:2px solid var(--gc-violet);animation:ls 1.2s ease-in-out infinite;margin-bottom:1.5rem;}
@keyframes ls{0%{transform:rotate(0) scale(1);border-color:var(--gc-violet);}50%{transform:rotate(180deg) scale(0.8);border-color:var(--gt-gold);}100%{transform:rotate(360deg) scale(1);border-color:var(--gc-violet);}}
.loader-text{font-family:'Orbitron',sans-serif;font-size:0.6rem;color:var(--gc-lavender);letter-spacing:0.4em;text-transform:uppercase;}
@media(max-width:768px){.nav-left,.nav-right{display:none;}.os-window{min-width:280px;}.wgrid,.pd-img-grid,.pd-techgrid{grid-template-columns:1fr;}#faceLabel{font-size:1.1rem;}.stats-row{gap:1.2rem;}.stat-item .val{font-size:0.9rem;}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-cube"></div><div class="loader-text">Initializing</div></div>
<canvas id="three-canvas"></canvas>
<div class="header"><div class="header-logo" onclick="resetCube()">Brandon <span>Whitehead</span></div><div class="header-hint">CLICK FACE TO EXPLORE // DRAG TO ORBIT // 1-6 HOTKEYS</div></div>
<div class="face-nav nav-left"><button class="face-btn" data-face="0">Projects</button><button class="face-btn" data-face="1">Academics</button><button class="face-btn" data-face="2">Skills</button></div>
<div class="face-nav nav-right"><button class="face-btn" data-face="3">Activities</button><button class="face-btn" data-face="4">About</button><button class="face-btn" data-face="5">Connect</button></div>
<div class="bottom-bar"><div class="stats-row"><div class="stat-item"><div class="val">4.22</div><div class="lbl">GPA</div></div><div class="stat-item"><div class="val">35</div><div class="lbl">ACT</div></div><div class="stat-item"><div class="val">8</div><div class="lbl">Projects</div></div><div class="stat-item"><div class="val">150+</div><div class="lbl">Service Hrs</div></div></div><div><div id="faceLabel">Portfolio</div><div id="faceSublabel">DRAG CUBE OR SELECT A FACE</div></div></div>
<div class="taskbar" id="taskbar"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const FL=[{name:'Projects',sub:'ENGINEERING PORTFOLIO',icon:'\u2699',color:'#B3A369'},{name:'Academics',sub:'COURSEWORK & SCORES',icon:'\uD83C\uDF93',color:'#6E3FC7'},{name:'Skills',sub:'TECHNICAL CAPABILITIES',icon:'\uD83D\uDD27',color:'#10B981'},{name:'Activities',sub:'LEADERSHIP & SERVICE',icon:'\uD83C\uDFC6',color:'#F59E0B'},{name:'About',sub:'WHO I AM',icon:'\uD83D\uDC64',color:'#3B82F6'},{name:'Connect',sub:'LINKS & CONTACT',icon:'\uD83D\uDD17',color:'#EC4899'}];
const MATERIAL_TO_LOGICAL=[1,3,4,5,0,2];
const FACE_ROTATIONS=[{x:0,y:0},{x:0,y:-Math.PI/2},{x:0,y:Math.PI},{x:0,y:Math.PI/2},{x:-Math.PI/2,y:0},{x:Math.PI/2,y:0}];
const PROJS={pipboy:{title:'ESP32 Pip-Boy 3000',accent:'linear-gradient(90deg,#F59E0B,#B3A369)',html:'<div class="wsec"><div class="wsec-title">Overview</div><p>A fully functional wearable computer designed with a practical-first philosophy. Rather than a cosplay prop, this is a real embedded system with live weather, compass heading, environmental readings, a stopwatch, ultrasonic radar, flashlight control, and more.</p><p>Built across multiple phases over several months, starting from pixels on a single display, progressively adding a second MCU, three screens, a full sensor suite, a LiPo battery system, and a custom 3D-printed enclosure.</p></div><div class="wsec"><div class="wsec-title">Dual-MCU Architecture</div><p>Two ESP32-WROOM-32E microcontrollers communicating over UART at 115200 baud with a JSON message protocol. The Main Controller drives the 4-inch TFT touchscreen (Hosyond 480x320 ST7796S over SPI), manages the tab menu, and handles WiFi/Bluetooth. The Sensor Hub drives the 0.96" SSD1306 OLED status bar and I2C LCD 1602 quick-readout, managing BME280, ultrasonic, photoresistor, and OV2640 camera.</p><div class="pd-highlight"><p>The dual-MCU decision was driven by GPIO limitations. Three displays, a camera, six sensors, an LED strip, audio, and WiFi could not fit on a single ESP32.</p></div></div><div class="wsec"><div class="wsec-title">10 Practical Tabs</div><div class="pd-techgrid"><div class="pd-techitem">Weather (WiFi)</div><div class="pd-techitem">Calendar</div><div class="pd-techitem">Compass</div><div class="pd-techitem">Stopwatch</div><div class="pd-techitem">Environment</div><div class="pd-techitem">Ultrasonic Radar</div><div class="pd-techitem">Camera (OV2640)</div><div class="pd-techitem">Audio Player</div><div class="pd-techitem">Flashlight (NeoPixel)</div><div class="pd-techitem">System Stats</div></div></div><div class="wsec"><div class="wsec-title">Photos</div><div class="pd-img-grid"><div class="pd-img"><img src="pipboy-breadboard-full.png"></div><div class="pd-img"><img src="pipboy-breadboard-closeup.png"></div><div class="pd-img"><img src="pipboy-tft-joystick.png"></div></div></div>'},
soundalert:{title:'Sound Alert Pro',accent:'linear-gradient(90deg,#EF4444,#F59E0B)',html:'<div class="wsec"><div class="wsec-title">Overview</div><p>Real-time sound monitoring on Raspberry Pi using Google YAMNet (TFLite, 521 sound categories). Configurable alerts for fire alarms, glass breaking, sirens. Priority engine (1-10 severity). Flask web dashboard with WebSocket live updates. Per-sound cooldown. CSV logging.</p></div><div class="wsec"><div class="wsec-title">Pipeline</div><p>Records 2s at 48kHz, resamples to 16kHz via SciPy, feeds TFLite interpreter, classifies across 521 categories. Exceeding 25% confidence triggers log + WebSocket event + Pushbullet notification. Offline mode replaces Pushbullet with local notifications.</p></div><div class="wsec"><div class="wsec-title">Demo Video</div><div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:6px;border:1px solid rgba(155,127,212,0.15);"><iframe src="https://www.youtube.com/embed/FN7jXybJcmc" title="Demo" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe></div></div><div class="wsec"><div class="wsec-title">Photos</div><div class="pd-img-grid"><div class="pd-img"><img src="soundalert-board.png"></div><div class="pd-img"><img src="soundalert-case-front.png"></div><div class="pd-img"><img src="soundalert-case-back.png"></div><div class="pd-img"><img src="soundalert-side.png"></div></div></div><a class="gh-link" href="https://github.com/brandonfwh/sound-alert-pro" target="_blank"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>'},
sediment:{title:'Sediment Sentry Buoy',accent:'linear-gradient(90deg,#10B981,#059669)',html:'<div class="wsec"><div class="wsec-title">Overview</div><p>Autonomous GPS-tagged turbidity monitoring buoy. Captures data at 60-second intervals, revealing dynamic patterns like rainfall-driven turbidity spikes that snapshot measurements would miss.</p></div><div class="wsec"><div class="wsec-title">4-Iteration Process</div><p><strong>Iter 1:</strong> Breadboard sensor calibration. 5 bentonite standards, 10 trials each. Found variable response + ambient light issues. Solution: CLEAN/WARNING/DANGER states.</p><p><strong>Iter 2:</strong> SD card logging + battery. Polynomial calibration (R\u00b2=0.987). Logged WARNING/DANGER with timestamps.</p><p><strong>Iter 3:</strong> GPS integration. 11.7-hour battery test. SD records time, turbidity, and coordinates for hotspot mapping.</p><p><strong>Iter 4:</strong> Waterproofing. 6-hour creek deployment in rain. 3x deploy-retrieve test. Clear epoxy to seal all openings.</p></div><div class="wsec"><div class="wsec-title">Photos</div><div class="pd-img-grid"><div class="pd-img"><img src="sediment-exterior.png"></div><div class="pd-img"><img src="sediment-internals.png"></div><div class="pd-img"><img src="sediment-sensor.png"></div><div class="pd-img"><img src="sediment-electronics.png"></div></div></div><a class="gh-link" href="https://github.com/brandonfwh/sediment-sentry" target="_blank"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>GitHub</a>'},
handtrack:{title:'HandWave & Hand Pong',accent:'linear-gradient(90deg,#3B82F6,#8B5CF6)',html:'<div class="wsec"><div class="wsec-title">HandWave</div><p>Maps hand position/fingers to real-time audio synthesis. Finger count = notes, palm height = volume, palm X = pitch (theremin mode), hand roll = vibrato. Three modes: Scale, Theremin, Chord. Optional Arduino LED output.</p></div><div class="wsec"><div class="wsec-title">Hand Pong</div><p>Two-player webcam Pong. Left/right hand = paddles. Five gesture abilities:</p><div class="pd-techgrid"><div class="pd-techitem">Pinch = Power Shot (1.8x, fire trail)</div><div class="pd-techitem">Fist = Shield (2x paddle size)</div><div class="pd-techitem">Rock On = Curve Ball (spin)</div><div class="pd-techitem">Thumbs Up = Taunt</div><div class="pd-techitem">Peace = Restart</div><div class="pd-techitem">Webcam / wireframe toggle</div></div><p style="margin-top:0.5rem">Particle explosions, charge bars, rally counter, screen shake, on-screen reactions.</p></div>'},
medrobot:{title:'Medical Robot CAD & FEA',accent:'linear-gradient(90deg,#8B5CF6,#6D28D9)',html:'<div class="wsec"><div class="wsec-title">Overview</div><p>Full CAD model and FEA for a startup building autonomous AI-powered medical robots. 3D-printer-style Cartesian axis system (X/Y/Z linear rails, stepper-driven lead screws).</p></div><div class="wsec"><div class="wsec-title">Work</div><p>Built in Fusion 360: frame, three axis carriages, linear rail mounts, stepper brackets, lead screw assemblies, end-effector plate. FEA validated deflection within medical tolerance. Stress concentrations at mounting points identified and fixed pre-prototyping.</p></div>'},
tsa:{title:'TSA Event Projects',accent:'linear-gradient(90deg,#B3A369,#D6CB8E)',html:'<div class="wsec"><div class="wsec-title">EchoShift Expedition</div><p>2D puzzle-platformer in Godot 4.5.1 for TSA Game Design. "EchoBand" records player movement, replays as semi-transparent echo. Three time abilities: Rewind, Forward-Shift, Stabilize. Teach-test-extend level design. All original pixel art, chiptune, SFX. WebGL export.</p></div><div class="wsec"><div class="wsec-title">Evolution of Transportation</div><p>On-rails museum sim for TSA VR Simulation. Eight eras (walking to spaceflight). Path3D ride system, audio crossfading, narration. Adapted from VR to flatscreen with mouse-look due to venue hardware constraints.</p></div>'},
orbital:{title:'Orbital Mechanics Simulator',accent:'linear-gradient(90deg,#06B6D4,#0891B2)',html:'<div class="wsec"><div class="wsec-title">Overview</div><p>Self-initiated for AP Physics. Newtonian gravity between celestial bodies in real time. Numerical integration for orbital paths, elliptical orbits, slingshots, multi-body interactions. Demonstrates gravitational force, centripetal acceleration, conservation of energy/momentum.</p></div><div class="wsec"><div class="wsec-title">Live Demo</div><a href="orbital-simulator.html" target="_blank" style="display:flex;text-decoration:none;height:120px;border-radius:6px;border:1px solid rgba(6,182,212,0.2);background:linear-gradient(135deg,#0c1222,#111d35);align-items:center;justify-content:center;flex-direction:column;gap:0.4rem;transition:border-color 0.3s;" onmouseover="this.style.borderColor=\'rgba(6,182,212,0.5)\'" onmouseout="this.style.borderColor=\'rgba(6,182,212,0.2)\'"><div style="font-family:Orbitron,sans-serif;font-size:0.7rem;color:#06B6D4;">Launch Interactive Simulator</div><div style="font-family:monospace;font-size:0.5rem;color:var(--gc-lavender);">Opens in new tab</div></a></div>'},
gravitycar:{title:'TSA Gravity Car',accent:'linear-gradient(90deg,#D6CB8E,#B3A369)',html:'<div class="wsec"><div class="wsec-title">Overview</div><p>Vehicle powered solely by a falling Coke can. Pulley system converts vertical descent into wheel rotation. Optimized pulley ratio for torque/speed balance, minimized rolling resistance, minimized mass.</p><div class="pd-highlight"><p>6th place at Georgia state TSA competition.</p></div></div>'}};

let wZ=50;const OW={};let wC=0;
function CW(title,html,accent,opts={}){const id='w'+(++wC);const w=opts.width||560,h=opts.height||500;const x=opts.x!==undefined?opts.x:Math.min(innerWidth-w-20,60+(wC%6)*35);const y=opts.y!==undefined?opts.y:Math.min(innerHeight-h-50,50+(wC%6)*30);const el=document.createElement('div');el.className='os-window';el.id=id;el.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++wZ};`;el.innerHTML=`<div class="win-header" data-wid="${id}"><div class="win-title"><div class="win-dot" style="background:${FL[0]?.color||'#B3A369'};"></div>${title}</div><div class="win-controls"><button class="win-ctrl minimize" onclick="minW('${id}')" title="Minimize"></button><button class="win-ctrl maximize" onclick="maxW('${id}')" title="Maximize"></button><button class="win-ctrl close" onclick="clW('${id}')" title="Close"></button></div></div><div class="win-accent" style="background:${accent||'linear-gradient(90deg,var(--gc-violet),var(--gt-gold))'};"></div><div class="win-body">${html}</div>`;document.body.appendChild(el);requestAnimationFrame(()=>el.classList.add('open'));OW[id]={el,title,min:false,max:false,ps:null};el.addEventListener('mousedown',()=>btf(id));const hdr=el.querySelector('.win-header');let dg=false,ox,oy;hdr.addEventListener('mousedown',e=>{if(e.target.closest('.win-controls'))return;if(OW[id].max)return;dg=true;ox=e.clientX-el.offsetLeft;oy=e.clientY-el.offsetTop;btf(id);e.preventDefault();});document.addEventListener('mousemove',e=>{if(!dg)return;el.style.left=(e.clientX-ox)+'px';el.style.top=(e.clientY-oy)+'px';});document.addEventListener('mouseup',()=>{dg=false;});uTB();return id;}

function cft(f,i){const s=512,cv=document.createElement('canvas');cv.width=s;cv.height=s;const c=cv.getContext('2d');const g=c.createLinearGradient(0,0,s,s);g.addColorStop(0,'#1a1035');g.addColorStop(1,'#0f0a20');c.fillStyle=g;c.fillRect(0,0,s,s);c.strokeStyle=f.color;c.lineWidth=3;c.shadowColor=f.color;c.shadowBlur=15;c.strokeRect(15,15,s-30,s-30);c.shadowBlur=0;c.strokeStyle='rgba(155,127,212,0.12)';c.lineWidth=1;c.strokeRect(30,30,s-60,s-60);c.strokeStyle=f.color;c.lineWidth=2;c.shadowColor=f.color;c.shadowBlur=8;c.beginPath();c.moveTo(30,60);c.lineTo(30,30);c.lineTo(60,30);c.stroke();c.beginPath();c.moveTo(s-60,30);c.lineTo(s-30,30);c.lineTo(s-30,60);c.stroke();c.beginPath();c.moveTo(30,s-60);c.lineTo(30,s-30);c.lineTo(60,s-30);c.stroke();c.beginPath();c.moveTo(s-60,s-30);c.lineTo(s-30,s-30);c.lineTo(s-30,s-60);c.stroke();c.shadowBlur=0;c.strokeStyle='rgba(155,127,212,0.03)';c.lineWidth=1;for(let j=60;j<s-60;j+=40){c.beginPath();c.moveTo(j,30);c.lineTo(j,s-30);c.stroke();c.beginPath();c.moveTo(30,j);c.lineTo(s-30,j);c.stroke();}c.font='72px sans-serif';c.textAlign='center';c.fillStyle=f.color;c.shadowColor=f.color;c.shadowBlur=20;c.fillText(f.icon,s/2,s/2-20);c.shadowBlur=0;c.font='700 28px Orbitron,sans-serif';c.fillStyle='#E8E0F5';c.fillText(f.name.toUpperCase(),s/2,s/2+40);c.font='14px monospace';c.fillStyle='rgba(155,127,212,0.5)';c.fillText(f.sub,s/2,s/2+65);c.font='600 16px Orbitron,sans-serif';c.fillStyle=f.color;c.textAlign='left';c.fillText('0'+(i+1),45,55);const t=new THREE.CanvasTexture(cv);t.anisotropy=renderer.capabilities.getMaxAnisotropy();return t;}

const r1=mkR(2.8,0x6E3FC7,0.1,{x:Math.PI/2.5,y:0.3}),r2=mkR(3.2,0xB3A369,0.07,{x:Math.PI/3,y:-0.5}),r3=mkR(3.6,0x4B2D8E,0.05,{x:Math.PI/1.8,y:0.8});cg.add(r1,r2,r3);
